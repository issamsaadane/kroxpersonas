name: Release

on:
  push:
    tags:
      - "v*.*.*"
  workflow_dispatch:

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Extract version from tag
        id: version
        shell: bash
        run: echo "value=${GITHUB_REF_NAME#v}" >> $GITHUB_OUTPUT

      - name: Patch tauri.conf.json version
        shell: bash
        run: |
          VERSION="${{ steps.version.outputs.value || '0.1.0' }}"
          node -e "const fs=require('fs'); const f='src-tauri/tauri.conf.json'; const c=JSON.parse(fs.readFileSync(f,'utf8')); c.version='$VERSION'; fs.writeFileSync(f, JSON.stringify(c, null, 2));"

      - name: Install Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust
        uses: swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - run: npm ci

      - name: Build Windows installer (NSIS)
        run: npx tauri build --bundles nsis

      - uses: actions/upload-artifact@v4
        with:
          name: windows
          path: src-tauri/target/release/bundle/nsis/*.exe

  build-macos:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Extract version from tag
        id: version
        shell: bash
        run: echo "value=${GITHUB_REF_NAME#v}" >> $GITHUB_OUTPUT

      - name: Patch tauri.conf.json version
        run: |
          VERSION="${{ steps.version.outputs.value || '0.1.0' }}"
          node -e "const fs=require('fs'); const f='src-tauri/tauri.conf.json'; const c=JSON.parse(fs.readFileSync(f,'utf8')); c.version='$VERSION'; fs.writeFileSync(f, JSON.stringify(c, null, 2));"

      - name: Install Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust
        uses: swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - run: npm ci

      - name: Build macOS DMG (ad-hoc signed)
        env:
          APPLE_SIGNING_IDENTITY: "-"
        run: npx tauri build --bundles dmg

      - uses: actions/upload-artifact@v4
        with:
          name: macos
          path: src-tauri/target/release/bundle/dmg/*.dmg

  release:
    if: startsWith(github.ref, 'refs/tags/v')
    needs: [build-windows, build-macos]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: windows
          path: artifacts/windows
      - uses: actions/download-artifact@v4
        with:
          name: macos
          path: artifacts/macos

      - uses: softprops/action-gh-release@v2
        with:
          name: "KroxPersonas ${{ github.ref_name }}"
          body: |
            KroxPersonas ${{ github.ref_name }}

            | Platform | File |
            |---|---|
            | Windows | `.exe` (NSIS installer) |
            | macOS   | `.dmg` (ad-hoc signed — run `xattr -cr /Applications/KroxPersonas.app` on first launch) |
          files: |
            artifacts/windows/*.exe
            artifacts/macos/*.dmg
          draft: false
          prerelease: false
