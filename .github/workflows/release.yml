name: Release

on:
  push:
    tags:
      - "v*.*.*"
  workflow_dispatch:

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Extract version from tag
        id: version
        shell: bash
        run: echo "value=${GITHUB_REF_NAME#v}" >> $GITHUB_OUTPUT

      - name: Patch tauri.conf.json version
        shell: bash
        run: |
          VERSION="${{ steps.version.outputs.value || '0.1.0' }}"
          node -e "const fs=require('fs'); const f='src-tauri/tauri.conf.json'; const c=JSON.parse(fs.readFileSync(f,'utf8')); c.version='$VERSION'; fs.writeFileSync(f, JSON.stringify(c, null, 2));"

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - uses: dtolnay/rust-toolchain@stable

      - uses: swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - run: npm ci

      - name: Build Windows (NSIS + updater)
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        run: npx tauri build --bundles nsis

      - uses: actions/upload-artifact@v4
        with:
          name: windows
          path: |
            src-tauri/target/release/bundle/nsis/*.exe
            src-tauri/target/release/bundle/nsis/*.nsis.zip
            src-tauri/target/release/bundle/nsis/*.nsis.zip.sig

  build-macos:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Extract version from tag
        id: version
        shell: bash
        run: echo "value=${GITHUB_REF_NAME#v}" >> $GITHUB_OUTPUT

      - name: Patch tauri.conf.json version
        run: |
          VERSION="${{ steps.version.outputs.value || '0.1.0' }}"
          node -e "const fs=require('fs'); const f='src-tauri/tauri.conf.json'; const c=JSON.parse(fs.readFileSync(f,'utf8')); c.version='$VERSION'; fs.writeFileSync(f, JSON.stringify(c, null, 2));"

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - uses: dtolnay/rust-toolchain@stable

      - uses: swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - run: npm ci

      - name: Build macOS (DMG + updater, ad-hoc signed)
        env:
          APPLE_SIGNING_IDENTITY: "-"
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        run: npx tauri build --bundles dmg

      - uses: actions/upload-artifact@v4
        with:
          name: macos
          path: |
            src-tauri/target/release/bundle/dmg/*.dmg
            src-tauri/target/release/bundle/macos/*.app.tar.gz
            src-tauri/target/release/bundle/macos/*.app.tar.gz.sig

  release:
    if: startsWith(github.ref, 'refs/tags/v')
    needs: [build-windows, build-macos]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/download-artifact@v4
        with:
          name: windows
          path: artifacts/windows
      - uses: actions/download-artifact@v4
        with:
          name: macos
          path: artifacts/macos

      - name: Build latest.json manifest
        env:
          VERSION: ${{ github.ref_name }}
          REPO: ${{ github.repository }}
        run: node .github/scripts/make-latest-json.mjs

      - uses: softprops/action-gh-release@v2
        with:
          name: "KroxPersonas ${{ github.ref_name }}"
          body: |
            KroxPersonas ${{ github.ref_name }}

            Auto-updater enabled — existing installs receive this version silently and apply on next restart.

            | Platform | File |
            |---|---|
            | Windows | `.exe` (NSIS installer) |
            | macOS (Apple Silicon) | `.dmg` — ad-hoc signed; first launch: `xattr -cr /Applications/KroxPersonas.app` |
          files: |
            artifacts/windows/*.exe
            artifacts/windows/*.nsis.zip
            artifacts/windows/*.nsis.zip.sig
            artifacts/macos/*.dmg
            artifacts/macos/*.app.tar.gz
            artifacts/macos/*.app.tar.gz.sig
            latest.json
          draft: false
          prerelease: false
